<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CaptainBPM v1</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 520px; margin: 0 auto; text-align: center; }
    button { font-size: 1rem; padding: 12px 16px; margin: 6px; border-radius: 8px; }
    .card { background: #f5f5f5; border-radius: 12px; padding: 16px; margin: 12px 0; }
    .beat { width: 120px; height: 120px; border-radius: 50%; background: #346ac7; margin: 8px auto; transition: all 90ms ease; }
    #bpmValue { font-size: 3rem; font-weight: bold; margin: 8px 0; }
    #status { margin-top: 12px; color: #444; }
    #clients { background: #e8f5e8; padding: 10px; border-radius: 6px; }
    #logs { background: #f0f0f0; height: 150px; overflow-y: auto; padding: 10px; text-align: left; font-size: 0.9rem; line-height: 1.4; border-radius: 6px; }
    .log-entry { margin: 2px 0; }
    @keyframes pulseBeat { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
    .beat.pulsing { animation: pulseBeat 140ms ease-out; }
  </style>
</head>
<body>
  <h1>CaptainBPM v1</h1>
  <button id="connectBtn">Connexion BLE</button>
  <div class="card">
    <div>BPM</div>
    <div id="bpmValue">---</div>
    <div id="beat" class="beat"></div>
    <div id="status">Non connecté</div>
  </div>
  <div class="card">
    <button id="bpmDown">-</button>
    <button id="bpmUp">+</button>
    <button id="tapSyncBtn">Tap synchro</button>
    <button id="muteBtn">Mute</button>
  </div>
  <div class="card">
    <div id="clients">Connectés: 0 (---)</div>
  </div>
  <div class="card">
    <div>Logs:</div>
    <div id="logs"></div>
  </div>

  <script>
    const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
    const BPM_UUID = "12345678-1234-1234-1234-1234567890ac";  // Read/Notify + Write pour client
    const BEAT_UUID = "12345678-1234-1234-1234-1234567890ad";
    const START_UUID = "12345678-1234-1234-1234-1234567890ae";
    const POS_UUID = "12345678-1234-1234-1234-1234567890af";
    const CLIENTS_UUID = "12345678-1234-1234-1234-1234567890b0";  // Nouveau

    let bpmValueEl = document.getElementById('bpmValue');
    let statusEl = document.getElementById('status');
    let beatEl = document.getElementById('beat');
    let clientsEl = document.getElementById('clients');
    let logsEl = document.getElementById('logs');
    let connectBtn = document.getElementById('connectBtn');
    let bpmUpBtn = document.getElementById('bpmUp');
    let bpmDownBtn = document.getElementById('bpmDown');
    let tapSyncBtn = document.getElementById('tapSyncBtn');
    let muteBtn = document.getElementById('muteBtn');

    let bpm = 120, running = false, device = null, muted = false;
    let sessionStartMsMaster = 0, lastSessionSyncLocal = 0;
    let audioCtx, masterGainNode, beatTimerId, metronomeStarted = false;
    let intervalMs = 500, nextBeatAtMs = 0, tapOriginMs = null;

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `[${ts}] ${msg}`;
      logsEl.appendChild(entry);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function nowMs() { return performance.now(); }
    function updateUI() { bpmValueEl.textContent = Math.round(bpm); }
    function setStatus(text) { statusEl.textContent = text; }
    function updateClients(data) { clientsEl.textContent = `Connectés: ${data.clients} (${data.list.join(', ') || '---'} )`; }

    // Audio & pulse (inchangé, simplifié)
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGainNode = audioCtx.createGain();
        masterGainNode.gain.value = muted ? 0 : 1;
        masterGainNode.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playClick(accent = false) {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = accent ? 1200 : 850;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(accent ? 0.8 : 0.55, t + 0.001);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
      osc.connect(gain);
      gain.connect(masterGainNode);
      osc.start(t);
      osc.stop(t + 0.05);
    }
    function pulseVisual() {
      beatEl.classList.remove('pulsing');
      void beatEl.offsetWidth;
      beatEl.classList.add('pulsing');
      setTimeout(() => beatEl.classList.remove('pulsing'), 180);
    }
    function toggleMute() {
      muted = !muted;
      if (masterGainNode) masterGainNode.gain.setValueAtTime(muted ? 0 : 1, audioCtx.currentTime);
      muteBtn.textContent = muted ? 'Unmute' : 'Mute';
      log(muted ? 'Son coupé' : 'Son réactivé');
    }

    // Métro (simplifié, existant)
    function recomputeInterval() { intervalMs = 60000 / bpm; }
    function computeNextBeat(referenceNow) {
      if (!tapOriginMs) return referenceNow;
      const elapsed = referenceNow - tapOriginMs;
      const beatsSince = Math.floor(elapsed / intervalMs);
      return tapOriginMs + (beatsSince + 1) * intervalMs;
    }
    function scheduleNextBeat() {
      if (!running) return;
      const now = nowMs();
      nextBeatAtMs = computeNextBeat(now);
      const delay = Math.max(1, nextBeatAtMs - now);
      const accent = Math.floor((now - tapOriginMs) / intervalMs) % 4 === 0;
      beatTimerId = setTimeout(() => {
        playClick(accent);
        pulseVisual();
        scheduleNextBeat();
      }, delay);
    }
    function startMetronome() {
      ensureAudio();
      recomputeInterval();
      running = true;
      tapOriginMs = nowMs();
      scheduleNextBeat();
      setStatus('En lecture');
      log('Métro démarré');
    }

    // BPM client -> master
    async function changeBPM(delta) {
      bpm += delta;
      bpm = Math.max(20, Math.min(300, bpm));
      if (device && device.gatt.connected) {
        const char = await device.gatt.getPrimaryService(SERVICE_UUID).then(s => s.getCharacteristic(BPM_UUID));
        await char.writeValueWithResponse(String(bpm));
        log(`BPM changé vers ${bpm} (envoyé au master)`);
      }
      updateUI();
      recomputeInterval();
    }

    // Synchro (inchangée + logs)
    function syncFromMasterTimecode() {
      const localNow = nowMs();
      const localDelta = localNow - lastSessionSyncLocal;
      const sessionNow = sessionStartMsMaster + localDelta;
      const beatsSince = (sessionNow / intervalMs);
      const beatIndex = Math.floor(beatsSince);
      const nextBeatSession = sessionStartMsMaster + (beatIndex + 1) * intervalMs;
      const offset = nextBeatSession - sessionNow;
      tapOriginMs = localNow + offset - intervalMs;
      nextBeatAtMs = localNow + offset;
      log(`Timecode reçu: synchro master (offset ~${Math.round(offset)}ms)`);
      if (running) {
        clearTimeout(beatTimerId);
        scheduleNextBeat();
      }
    }

    // BLE
    async function connectBLE() {
      try {
        setStatus('Sélection boîtier...');
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });
        log(`Connexion à ${device.name || 'ESP32'}`);
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        // BPM (read + notify + write enable)
        const bpmChar = await service.getCharacteristic(BPM_UUID);
        bpmChar.startNotifications();
        bpmChar.addEventListener('characteristicvaluechanged', e => {
          bpm = parseInt(new TextDecoder().decode(e.target.value.buffer).trim());
          recomputeInterval();
          updateUI();
          log(`BPM reçu du master: ${bpm}`);
        });

        // Autres (beat, pos, start) - code existant simplifié
        const beatChar = await service.getCharacteristic(BEAT_UUID);
        beatChar.startNotifications();
        beatChar.addEventListener('characteristicvaluechanged', () => log('Beat reçu du master'));

        const startChar = await service.getCharacteristic(START_UUID);
        startChar.startNotifications();
        startChar.addEventListener('characteristicvaluechanged', e => {
          const val = parseInt(new TextDecoder().decode(e.target.value.buffer).trim());
          if (isFinite(val)) {
            sessionStartMsMaster = val;
            lastSessionSyncLocal = nowMs();
            syncFromMasterTimecode();
          }
        });

        // NOUVEAU: Clients
        const clientsChar = await service.getCharacteristic(CLIENTS_UUID);
        clientsChar.startNotifications();
        clientsChar.addEventListener('characteristicvaluechanged', e => {
          try {
            const data = JSON.parse(new TextDecoder().decode(e.target.value.buffer));
            updateClients(data);
            log(`Màj connectés: ${data.clients} appareils`);
          } catch {}
        });

        // Déco
        device.addEventListener('gattserverdisconnected', () => {
          log('Déconnecté du master');
          setStatus('Déconnecté');
          running = false;
        });

        setStatus('Connecté');
        log('Connexion établie');
        startMetronome();
        updateUI();
      } catch (err) {
        log(`Erreur BLE: ${err.message}`);
      }
    }

    // Events
    connectBtn.onclick = connectBLE;
    bpmUpBtn.onclick = () => changeBPM(1);
    bpmDownBtn.onclick = () => changeBPM(-1);
    tapSyncBtn.onclick = () => {
      tapOriginMs = nowMs();
      log('Tap synchro locale');
      if (running) scheduleNextBeat();
    };
    muteBtn.onclick = toggleMute;

    updateUI();
  </script>
</body>
</html>
