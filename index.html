<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CaptainBPM v1</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 520px; margin: 0 auto; text-align: center; }
    button { font-size: 1rem; padding: 12px 16px; margin: 6px; border-radius: 8px; }
    .card { background: #f5f5f5; border-radius: 12px; padding: 16px; margin: 12px 0; }
    .beat { width: 120px; height: 120px; border-radius: 50%; background: #346ac7; margin: 8px auto; transition: all 90ms ease; }
    #bpmValue { font-size: 3rem; font-weight: bold; margin: 8px 0; color: #333; }
    #status { margin-top: 12px; color: #444; }
    #clients { background: #e8f5e8; padding: 10px; border-radius: 6px; font-weight: bold; }
    #logs { background: #f0f0f0; height: 150px; overflow-y: auto; padding: 10px; text-align: left; font-size: 0.9rem; line-height: 1.4; border-radius: 6px; }
    .log-entry { margin: 2px 0; }
    @keyframes pulseBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    .beat.pulsing { animation: pulseBeat 140ms ease-out; }
  </style>
</head>
<body>
  <h1>CaptainBPM v1.04</h1>
  <button id="connectBtn">Connexion BLE</button>
  <div class="card">
    <div>BPM</div>
    <div id="bpmValue">--</div>  <!-- CORRIGÉ: Pas de 120 -->
    <div id="beat" class="beat"></div>
    <div id="status">Non connecté</div>
  </div>
  <div class="card">
    <button id="bpmDown">-</button>
    <button id="bpmUp">+</button>
    <button id="tapSyncBtn">Tap synchro</button>
    <button id="muteBtn">Mute</button>
  </div>
  <div class="card">
    <div id="clients">Connectés: --</div>
  </div>
  <div class="card">
    <div>Logs événements:</div>
    <div id="logs"></div>
  </div>

  <script>
    // UUIDs exacts v1
    const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
    const BPM_UUID = "12345678-1234-1234-1234-1234567890ac";
    const BEAT_UUID = "12345678-1234-1234-1234-1234567890ad";
    const START_UUID = "12345678-1234-1234-1234-1234567890ae";
    const CLIENTS_UUID = "12345678-1234-1234-1234-1234567890b0";

    let bpmValueEl = document.getElementById('bpmValue');
    let statusEl = document.getElementById('status');
    let beatEl = document.getElementById('beat');
    let clientsEl = document.getElementById('clients');
    let logsEl = document.getElementById('logs');
    let connectBtn = document.getElementById('connectBtn');
    let bpmUpBtn = document.getElementById('bpmUp');
    let bpmDownBtn = document.getElementById('bpmDown');
    let tapSyncBtn = document.getElementById('tapSyncBtn');
    let muteBtn = document.getElementById('muteBtn');

    let bpm = 0;  // CORRIGÉ: 0 par défaut
    let running = false;
    let device = null;
    let muted = false;
    let audioCtx, masterGainNode, beatTimerId;
    let intervalMs = 500, nextBeatAtMs = 0, tapOriginMs = null;
    let sessionStartMsMaster = 0, lastSessionSyncLocal = 0;
    let isPlayingBeat = false;  // ANTI-DOUBLE SON

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `[${ts}] ${msg}`;
      logsEl.appendChild(entry);
      logsEl.scrollTop = logsEl.scrollHeight;
      console.log(msg);  // Debug
    }

    function nowMs() { return performance.now(); }
    function updateUI() { bpmValueEl.textContent = bpm || '--'; }
    function setStatus(text) { statusEl.textContent = text; }
    function updateClients(count) { clientsEl.textContent = `Connectés: ${count}`; }

    // Audio CORRIGÉ: anti-double + mute
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGainNode = audioCtx.createGain();
        masterGainNode.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playClick(accent = false) {
      if (isPlayingBeat) return;  // ANTI-DOUBLE SON
      isPlayingBeat = true;
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = accent ? 1200 : 850;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(accent ? 0.8 : 0.55, t + 0.001);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
      osc.connect(gain);
      gain.connect(masterGainNode);
      osc.start(t);
      osc.stop(t + 0.05);
      setTimeout(() => { isPlayingBeat = false; }, 60);
    }
    function toggleMute() {
      muted = !muted;
      masterGainNode.gain.setValueAtTime(muted ? 0 : 1, audioCtx.currentTime);
      muteBtn.textContent = muted ? 'Unmute' : 'Mute';
      log(muted ? 'Son coupé' : 'Son réactivé');
    }

    function recomputeInterval() { intervalMs = 60000 / bpm; }
    function computeNextBeat(refNow) {
      if (!tapOriginMs) return refNow;
      const elapsed = refNow - tapOriginMs;
      return tapOriginMs + (Math.floor(elapsed / intervalMs) + 1) * intervalMs;
    }
    function scheduleNextBeat() {
      if (!running) return;
      const now = nowMs();
      nextBeatAtMs = computeNextBeat(now);
      const delay = Math.max(1, nextBeatAtMs - now);
      const accent = Math.floor((now - tapOriginMs || 0) / intervalMs) % 4 === 0;
      beatTimerId = setTimeout(() => {
        playClick(accent);
        beatEl.classList.remove('pulsing');
        void beatEl.offsetWidth;
        beatEl.classList.add('pulsing');
        setTimeout(() => beatEl.classList.remove('pulsing'), 180);
        scheduleNextBeat();
      }, delay);
    }
    function startMetronome() {
      ensureAudio();
      recomputeInterval();
      running = true;
      tapOriginMs = nowMs();
      scheduleNextBeat();
      setStatus('En lecture');
      log('Métro synchronisé');
    }
    function syncFromMasterTimecode() {
      const localNow = nowMs();
      const localDelta = localNow - lastSessionSyncLocal;
      const sessionNow = sessionStartMsMaster + localDelta;
      const beatsSince = sessionNow / intervalMs;
      const nextBeatSession = sessionStartMsMaster + (Math.floor(beatsSince) + 1) * intervalMs;
      const offset = nextBeatSession - sessionNow;
      tapOriginMs = localNow + offset - intervalMs;
      log(`Synchro timecode (offset ~${Math.round(offset)}ms)`);
      if (running) {
        clearTimeout(beatTimerId);
        scheduleNextBeat();
      }
    }
    // CONNEXION CORRIGÉE
    async function connectBLE() {
      try {
        setStatus('Sélection ESP32...');
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });
        log(`Connecté: ${device.name || 'ESP32'}`);

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);

        // BPM READ INITIAL (fix rapidité)
        const bpmChar = await service.getCharacteristic(BPM_UUID);
        const initBpmData = await bpmChar.readValue();  // LECTURE
        bpm = parseInt(new TextDecoder().decode(initBpmData.buffer).trim()) || 120;
        recomputeInterval();
        updateUI();
        log(`BPM ESP32 initial: ${bpm}`);

        // Clients READ INITIAL
        const clientsChar = await service.getCharacteristic(CLIENTS_UUID);
        const initClientsData = await clientsChar.readValue();
        try {
          const clientsData = JSON.parse(new TextDecoder().decode(initClientsData.buffer));
          updateClients(clientsData.clients);
          log(`Clients init: ${clientsData.clients}`);
        } catch (e) {
          log('Clients read erreur');
        }

        bpmChar.startNotifications();
        bpmChar.addEventListener('characteristicvaluechanged', (e) => {
          const newBpm = parseInt(new TextDecoder().decode(e.target.value.buffer).trim());
          if (newBpm > 0 && newBpm !== bpm) {
            bpm = newBpm;
            recomputeInterval();
            updateUI();
            log(`BPM mis à jour: ${bpm}`);
          }
        });

        async function changeBPM(delta) {
          bpmUpBtn.onclick = () => changeBPM(1);
          bpmDownBtn.onclick = () => changeBPM(-1);
          if (!device?.gatt?.connected) {
            log('Non connecté');
            return;
          }
          bpm += delta;
          bpm = Math.max(20, Math.min(300, bpm));
          try {
            const service = await device.gatt.getPrimaryService(SERVICE_UUID);
            const char = await service.getCharacteristic(BPM_UUID);
            const encoder = new TextEncoder();
            const data = encoder.encode(String(bpm));  // ArrayBuffer OK
            await char.writeValueWithoutResponse(data);  // FIXED
            recomputeInterval();
            updateUI();
            log(`BPM ${bpm} envoyé ESP32`);
          } catch (e) {
            log(`Erreur write: ${e.message}`);
          }
        };

        // Déco
        device.addEventListener('gattserverdisconnected', () => {
          log('Déconnecté');
          setStatus('Déconnecté');
          running = false;
          clearTimeout(beatTimerId);
          bpm = 0;
          updateUI();
        });

        setStatus('Connecté');
        log('Prêt - BPM/timecode OK');
        startMetronome();
      } catch (err) {
        log(`Erreur: ${err.message}`);
        setStatus('Erreur');
      }
    }

    // Events
    connectBtn.onclick = connectBLE;
    bpmUpBtn.onclick = () => changeBPM(1);
    bpmDownBtn.onclick = () => changeBPM(-1);
    tapSyncBtn.onclick = () => {
      tapOriginMs = nowMs();
      log('Tap synchro');
      if (running) scheduleNextBeat();
    };
    muteBtn.onclick = toggleMute;

    // Init: BPM vide
    updateUI();
    log('Page chargée - connectez BLE');
  </script>
</body>
</html>
