<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CaptainBPM v1</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 520px; margin: 0 auto; text-align: center; }
    button { font-size: 1rem; padding: 12px 16px; margin: 6px; border-radius: 8px; }
    .card { background: #f5f5f5; border-radius: 12px; padding: 16px; margin: 12px 0; }
    .beat { width: 120px; height: 120px; border-radius: 50%; background: #346ac7; margin: 8px auto; transition: all 90ms ease; }
    #bpmValue { font-size: 3rem; font-weight: bold; margin: 8px 0; color: #333; }
    #status { margin-top: 12px; color: #444; }
    #clients { background: #e8f5e8; padding: 10px; border-radius: 6px; font-weight: bold; }
    #logs { background: #f0f0f0; height: 150px; overflow-y: auto; padding: 10px; text-align: left; font-size: 0.9rem; line-height: 1.4; border-radius: 6px; }
    .log-entry { margin: 2px 0; }
    @keyframes pulseBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    .beat.pulsing { animation: pulseBeat 140ms ease-out; }
  </style>
</head>
<body>
  <h1>CaptainBPM v1.076</h1>
  <button id="connectBtn">Connexion BLE</button>

  <div class="card">
    <div>BPM</div>
    <div id="bpmValue">--</div>
    <div id="beat" class="beat"></div>
    <div id="status">Non connecté</div>
  </div>

  <div class="card">
    <button id="bpmDown">-</button>
    <button id="bpmUp">+</button>
    <button id="muteBtn">Mute</button>
  </div>

  <div class="card">
    <div id="clients">Connectés: --</div>
  </div>

  <div class="card">
    <div>Logs événements:</div>
    <div id="logs"></div>
  </div>

  <script>
    const SERVICE_UUID = "03b80e5a-ede8-4b33-a751-6ce34ec4c700";
    const MIDI_IO_UUID = "7772e5db-3868-4112-a1a9-f2669d106bf3";

    const bpmValueEl = document.getElementById('bpmValue');
    const statusEl = document.getElementById('status');
    const beatEl = document.getElementById('beat');
    const clientsEl = document.getElementById('clients');
    const logsEl = document.getElementById('logs');
    const connectBtn = document.getElementById('connectBtn');
    const bpmUpBtn = document.getElementById('bpmUp');
    const bpmDownBtn = document.getElementById('bpmDown');
    const muteBtn = document.getElementById('muteBtn');

    let device = null;
    let server = null;
    let service = null;
    let midiChar = null;

    let bpm = 0;
    let running = false;
    let muted = false;
    let audioCtx = null;
    let masterGainNode = null;
    let beatTimerId = null;
    let intervalMs = 0;
    let nextBeatAtMs = 0;
    let beatIndex = 0;
    let bleConnected = false;

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `[${ts}] ${msg}`;
      logsEl.appendChild(entry);
      logsEl.scrollTop = logsEl.scrollHeight;
      console.log(msg);
    }

    function updateUI() {
      bpmValueEl.textContent = bpm > 0 ? String(bpm) : '--';
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateClients(text) {
      clientsEl.textContent = text;
    }

    function recomputeInterval() {
      intervalMs = bpm > 0 ? (60000 / bpm) : 0;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGainNode = audioCtx.createGain();
        masterGainNode.gain.value = muted ? 0 : 1;
        masterGainNode.connect(audioCtx.destination);
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function triggerBeat(accent = false) {
      ensureAudio();
      const t = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'square';
      osc.frequency.value = accent ? 1200 : 850;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(accent ? 0.8 : 0.55, t + 0.001);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);

      osc.connect(gain);
      gain.connect(masterGainNode);
      osc.start(t);
      osc.stop(t + 0.05);

      beatEl.classList.remove('pulsing');
      void beatEl.offsetWidth;
      beatEl.classList.add('pulsing');
      setTimeout(() => beatEl.classList.remove('pulsing'), 180);
    }

    function stopMetronome() {
      running = false;
      clearTimeout(beatTimerId);
      beatTimerId = null;
      nextBeatAtMs = 0;
      beatIndex = 0;
      setStatus('Arrêt');
    }

    function scheduleNextBeat() {
      if (!running || bpm <= 0) return;

      const now = performance.now();
      const delay = Math.max(0, nextBeatAtMs - now);
      clearTimeout(beatTimerId);

      beatTimerId = setTimeout(() => {
        if (!running) return;

        const accent = (beatIndex % 4) === 0;
        triggerBeat(accent);

        beatIndex = (beatIndex + 1) % 4;
        nextBeatAtMs += intervalMs;

        if (performance.now() - nextBeatAtMs > intervalMs) {
          nextBeatAtMs = performance.now() + intervalMs;
          beatIndex = 0;
        }

        scheduleNextBeat();
      }, delay);
    }

    function startMetronome() {
      if (bpm <= 0 || running) return;
      ensureAudio();
      recomputeInterval();
      running = true;
      nextBeatAtMs = performance.now();
      beatIndex = 0;
      setStatus('En lecture');
      log('Métronome démarré');
      scheduleNextBeat();
    }

    function startMetronomeIfNeeded() {
      if (!running && bpm > 0) {
        startMetronome();
      }
    }

    function handleMidiPacket(dataView) {
      const bytes = new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength);
      if (bytes.length < 2) return;

      const type = bytes[0];
      const value = bytes[1];

      if (type === 0x01) {
        bpm = value;
        recomputeInterval();
        updateUI();
        log(`BPM reçu: ${bpm}`);
        startMetronomeIfNeeded();
      } else if (type === 0x02) {
        log(`Beat reçu: ${value}`);
      } else if (type === 0x03) {
        log(`Timecode reçu: ${Array.from(bytes.slice(1)).join(",")}`);
        startMetronomeIfNeeded();
      } else if (type === 0x04) {
        updateClients(`Connectés: ${value}`);
      }
    }

    async function connectBLE() {
      try {
        setStatus('Sélection ESP32...');

        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });

        log(`Connecté: ${device.name || "Appareil BLE"}`);
        updateClients(`Connecté: ${device.name || "Appareil BLE"}`);

        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        midiChar = await service.getCharacteristic(MIDI_IO_UUID);

        if (!midiChar) {
          throw new Error("Caractéristique MIDI introuvable");
        }

        await midiChar.startNotifications();
        bleConnected = true;

        midiChar.addEventListener("characteristicvaluechanged", (event) => {
          handleMidiPacket(event.target.value);
        });

        const initData = await midiChar.readValue();
        log(`Raw MIDI data: [${Array.from(new Uint8Array(initData.buffer)).join(",")}]`);
        handleMidiPacket(initData);
        startMetronomeIfNeeded();

        device.addEventListener("gattserverdisconnected", () => {
          log("Déconnecté");
          stopMetronome();
          bpm = 0;
          updateUI();
          updateClients("Connectés: --");
          setStatus("Non connecté");
          bleConnected = false;
        });

        setStatus("Prêt");
        bleConnected = true;
        startMetronomeIfNeeded();
      } catch (err) {
        log(`Erreur: ${err.message}`);
        setStatus("Erreur");
      }
    }

    connectBtn.addEventListener('click', async () => {
      ensureAudio();
      await connectBLE();
    });

    bpmUpBtn.onclick = async () => {
      if (!midiChar) return;
      const value = Math.min(300, bpm + 1);
      await midiChar.writeValueWithoutResponse(new Uint8Array([0x01, value]));
    };

    bpmDownBtn.onclick = async () => {
      if (!midiChar) return;
      const value = Math.max(20, bpm - 1);
      await midiChar.writeValueWithoutResponse(new Uint8Array([0x01, value]));
    };

    muteBtn.onclick = () => {
      muted = !muted;
      if (masterGainNode && audioCtx) {
        masterGainNode.gain.setValueAtTime(muted ? 0 : 1, audioCtx.currentTime);
      }
      muteBtn.textContent = muted ? "Unmute" : "Mute";
      log(muted ? "Son coupé" : "Son réactivé");
    };

    updateUI();
    log("Page chargée - connectez BLE");
  </script>
</body>
</html>
